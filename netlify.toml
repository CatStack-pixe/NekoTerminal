[build]
  command = "npm run build"
  # @netlify/plugin-nextjs 自动管理 publish 目录，不需要手动指定

[build.environment]
  # NEXT_PUBLIC_* 变量在 Next.js 构建时会被内联到客户端/Edge 产物中，
  # Supabase 的 anon key 与 URL 本就是公开值（由 RLS 保护），
  # 因此从 Netlify 的密钥扫描中排除这些键，但保留对真正密钥的扫描。
  SECRETS_SCAN_OMIT_KEYS = "NEXT_PUBLIC_SUPABASE_ANON_KEY,NEXT_PUBLIC_SUPABASE_URL"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["@supabase/supabase-js", "@aws-sdk/client-s3", "pg"]
